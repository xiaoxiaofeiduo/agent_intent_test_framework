cases:
- id: u_code_build_execute_allow
  name: 用户意图 CODE_BUILD：允许 EXECUTE
  stream: true
  request:
    tools:
    - name: bash
      description: 执行 shell 命令
    messages:
    - role: system
      content: You are OpenCode
    - role: user
      content: 运行测试并构建项目
  mock_response:
    tool_calls:
    - id: call_1
      name: bash
      arguments:
        command: make build
  expect:
    action: pass
    status:
    - 200
    body_not_contains:
    - 智能体执行行为与用户意图偏离，无法继续执行。
